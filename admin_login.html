{% extends 'base.html' %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="page-header mb-4 text-center">
            <h2 class="fw-bold mb-2">Admin Login</h2>
            <p class="text-secondary mb-0">Login to access charging analytics and management dashboard.</p>
        </div>

        <div class="glass-card p-4 p-md-5">
            <form method="POST" action="{{ url_for('admin_login') }}" class="row g-3">
                <div class="col-12">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control ev-input" placeholder="Enter admin username" required>
                </div>

                <div class="col-12">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control ev-input" placeholder="Enter password" required>
                </div>

                <div class="col-12 d-grid mt-2">
                    <button class="btn btn-ev-primary btn-lg">Login</button>
                </div>
            </form>

            <div class="note-box mt-4">
                <strong>Demo admin credentials:</strong><br>
                Username: <strong>admin</strong><br>
                Password: <strong>admin123</strong>
            </div>
        </div>
    </div>
</div>
{% endblock %}
